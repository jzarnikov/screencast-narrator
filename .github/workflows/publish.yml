name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzbar0 ffmpeg
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e api/python-client
          pip install -e ".[dev,e2e]"
          pip install playwright
          playwright install chromium --with-deps
      - name: Run e2e tests
        run: pytest -m e2e -v

  publish:
    needs: e2e
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build client package
        run: python -m build api/python-client
      - name: Publish client to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: api/python-client/dist/
      - name: Wait for client package availability
        run: |
          CLIENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('api/python-client/pyproject.toml','rb'))['project']['version'])")
          for i in $(seq 1 30); do
            if pip index versions screencast-narrator-client 2>/dev/null | grep -q "$CLIENT_VERSION"; then
              echo "Client $CLIENT_VERSION available on PyPI"
              break
            fi
            echo "Waiting for client $CLIENT_VERSION on PyPI... ($i/30)"
            sleep 10
          done
      - name: Build main package
        run: python -m build
      - name: Publish main package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  jitpack:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Trigger JitPack build
        run: |
          VERSION=${GITHUB_REF_NAME}
          echo "Triggering JitPack build for $VERSION..."
          curl -s "https://jitpack.io/com/github/mmarinschek/screencast-narrator/$VERSION/screencast-narrator-$VERSION.pom" > /dev/null || true
          for i in $(seq 1 60); do
            STATUS=$(curl -s "https://jitpack.io/api/builds/com.github.mmarinschek/screencast-narrator/$VERSION" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
            if [ "$STATUS" = "ok" ]; then
              echo "JitPack build succeeded for $VERSION"
              exit 0
            elif [ "$STATUS" = "Error" ]; then
              echo "JitPack build FAILED for $VERSION"
              echo "Check https://jitpack.io/#mmarinschek/screencast-narrator/$VERSION"
              exit 1
            fi
            echo "Waiting for JitPack build... ($i/60)"
            sleep 5
          done
          echo "JitPack build timed out"
          exit 1
